<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Clone - Simulador Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css?v=20260312-6">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="./app.js?v=20260312-6" defer></script>
</head>
<body>
    <div class="ticker-bar" id="tickerBar"></div>

    <div class="main-grid">
        <div class="chart-panel">
            <div class="chart-header">
                <div class="symbol-info">
                    <div class="symbol-main">
                        <span class="symbol-name" id="symbolName">BTCUSDT</span>
                        <span class="symbol-type">Spot Sim</span>
                    </div>
                    <div class="price-info">
                        <span class="current-price" id="currentPrice">-</span>
                        <span class="price-change" id="priceChange">-</span>
                    </div>
                </div>
                <div class="leverage-selector">
                    <span>Cross</span>
                    <select id="leverageSelect">
                        <option value="20">20x</option>
                        <option value="10">10x</option>
                        <option value="5">5x</option>
                        <option value="3">3x</option>
                        <option value="1">1x</option>
                    </select>
                </div>
            </div>

            <div class="timeframes">
                <button class="timeframe-btn" data-timeframe="15m">15m</button>
                <button class="timeframe-btn active" data-timeframe="1h">1h</button>
                <button class="timeframe-btn" data-timeframe="4h">4h</button>
                <button class="timeframe-btn" data-timeframe="1d">1D</button>
            </div>

                <div class="ma-indicators">
                    <div class="ma-item"><span class="ma-label">MA(7):</span><span class="ma-value" id="ma7">-</span></div>
                    <div class="ma-item"><span class="ma-label">MA(25):</span><span class="ma-value" id="ma25">-</span></div>
                    <div class="ma-item"><span class="ma-label">MA(99):</span><span class="ma-value" id="ma99">-</span></div>
                    <div class="ma-item"><span class="ma-label">USDT/MXN:</span><span class="ma-value" id="usdtMxn">-</span></div>
                    <div class="ma-item"><span class="ma-label">Mentor:</span><span class="ma-value">Ctrl/⌘ + K</span></div>
                </div>

            <div id="chartContainer"></div>
        </div>

        <div class="right-panel">
            <div class="order-book">
                <div class="order-book-header">
                    <span>Precio (MXN)</span>
                    <span>Cantidad</span>
                    <span>Total (MXN)</span>
                </div>

                <div class="order-book-content" id="orderBookAsks"></div>

                <div class="depth-meter">
                    <div class="depth-bid" id="depthBid" style="width:50%"></div>
                    <div class="depth-ask" id="depthAsk" style="width:50%"></div>
                </div>

                <div class="spread" id="spread">Spread: -</div>
                <div class="order-book-content" id="orderBookBids"></div>
            </div>

            <div class="trading-panel">
                <div class="tabs">
                    <div class="tab active">Límite</div>
                    <div class="tab">Market</div>
                    <div class="tab">Stop</div>
                </div>

                <div class="balance-info">
                    <span>Saldo Virtual</span>
                    <span id="balance">$0 MXN</span>
                </div>

                <input type="number" class="trade-input" id="priceInput" placeholder="Precio MXN">
                <input type="number" class="trade-input" id="amountInput" placeholder="Cantidad">

                <div class="balance-info">
                    <span>Total:</span>
                    <span id="totalAmount">$0 MXN</span>
                </div>

                <div class="button-group">
                    <button class="btn-buy" id="buyLongBtn">Comprar/Long</button>
                    <button class="btn-sell" id="sellShortBtn">Vender/Short</button>
                </div>

                <div class="button-group">
                    <button class="btn-long" id="buyBTCBtn">Comprar Spot</button>
                    <button class="btn-short" id="sellBTCBtn">Vender Spot</button>
                </div>
            </div>

            <div class="positions-panel">
                <div class="positions-header">
                    <span>Posición</span>
                    <span>Cantidad</span>
                    <span>Entrada</span>
                    <span>PnL</span>
                </div>
                <div id="positions"></div>
            </div>
        </div>
    </div>

    <div class="mentor-overlay" id="mentorOverlay" aria-hidden="true">
        <div class="mentor-modal">
            <div class="mentor-header">
                <h3>Mentor de Trading</h3>
                <button id="mentorCloseBtn" class="mentor-close" aria-label="Cerrar mentor">×</button>
            </div>
            <p class="mentor-subtitle">Atajo: <strong>Ctrl/⌘ + K</strong></p>
            <ul id="mentorList" class="mentor-list"></ul>
            <p class="mentor-disclaimer">Esto es educativo y no es consejo financiero.</p>
        </div>
    </div>
</body>
</html>
